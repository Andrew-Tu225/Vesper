[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
# Exclude eval/ from the default run — eval tests call real LLMs and are not
# measuring app code coverage. Run them explicitly: pytest tests/eval/
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=80 --ignore=tests/eval"
markers = [
    "llm_judge: marks tests that call a real LLM for qualitative evaluation (set EVAL_LLM_JUDGE=1)",
]

[tool.coverage.run]
omit = [
    # Stub workers — implemented in Phase 2+, not yet testable
    "app/workers/*",
    # Stub model — implemented in Phase 4+
    "app/models/workspace_settings.py",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "S"]
ignore = ["S101"]  # allow assert in tests

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
